<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MixPlanner React 1.41</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        if (window.location.protocol === 'file:') {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="max-width:760px;margin:48px auto;padding:24px;border:1px solid #dbeafe;border-radius:16px;background:#eff6ff;font-family:Segoe UI,sans-serif;color:#1e3a8a">' +
            '<h1 style="margin:0 0 12px 0;font-size:28px">MixPlanner React 1.41</h1>' +
            '<p style="margin:0 0 12px 0;font-size:16px;color:#1f2937">Deze React-versie opent niet rechtstreeks via dubbelklik op <strong>index.html</strong>.</p>' +
            '<p style="margin:0 0 12px 0;font-size:15px;color:#1f2937">Dit is een Vite-project en moet via een lokale webserver draaien.</p>' +
            '<div style="margin-top:18px;padding:16px;border-radius:12px;background:#fff;border:1px solid #bfdbfe;color:#1f2937">' +
            '<div style="font-weight:700;margin-bottom:8px">Zo start je hem:</div>' +
            '<ol style="margin:0;padding-left:20px;line-height:1.7">' +
            '<li>Installeer Node.js als dat nog niet op deze pc staat.</li>' +
            '<li>Open <strong>start-react-worker.bat</strong> in deze map.</li>' +
            '<li>Open daarna <strong>http://localhost:3000</strong> in je browser.</li>' +
            '</ol>' +
            '</div>' +
            '</div>';
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>

</html>
